title: "At-Tawahidiyya"
description: "A philosophical school devoted to the study of divine unity, scriptural interpretation, and theological refinement."
remote_theme: pages-themes/minimal@v0.2.0

url: "https://tawhidi-suleyman.github.io"
baseurl: "/Al-Tawhidiyya"

# Markdown processor
markdown: kramdown

# Collections
collections:
  foundations:
    output: true
    permalink: /:collection/:name/
  tafsir:
    output: true
    permalink: /:collection/:name/
  refutations:
    output: true
    permalink: /:collection/:name/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "foundations"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "tafsir"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "refutations"
    values:
      layout: "page"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
