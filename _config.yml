title: "At-Tawahidiyya"
description: "A school of philosophical theology devoted to divine unity, scriptural coherence, and the logic of creation."
author: "Suleyman al-Tawhidi"

url: "https://tawhidi-suleyman.github.io"
baseurl: "/Al-Tawhidiyya"

remote_theme: pages-themes/minimal@v0.2.0
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  auto_ids: true

# Collections
collections:
  foundations:
    output: true
    permalink: /foundations/:name/
  tafsir:
    output: true
    permalink: /tafsir/:name/
  refutations:
    output: true
    permalink: /refutations/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: foundations
    values:
      layout: page
  - scope:
      path: ""
      type: tafsir
    values:
      layout: page
  - scope:
      path: ""
      type: refutations
    values:
      layout: page

# Tag archive pages (Liquid-based, no plugin needed for GitHub Pages)
# Tags are aggregated via Liquid in _layouts/tag.html and assets/tags/

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
